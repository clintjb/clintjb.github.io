<div class="iframe-container">
  <iframe src="https://htmlpreview.github.io/?https://raw.githubusercontent.com/clintjb/Commute-Tracking/main/commute.html"></iframe>
</div>

<style>
.iframe-container {
  position: relative;
  width: 100%;
  overflow: hidden;
}

.iframe-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 780px;
  height: 1600px;
  transform-origin: top left;
  display: block;
  border: none;
}
</style>

<script>
function scaleIframe() {
  const container = document.querySelector('.iframe-container');
  const iframe = container?.querySelector('iframe');

  if (!iframe || !container) return;

  const baseWidth = 780;
  const baseHeight = 1600;

  let scale;

  if (window.innerWidth < 600) {
    scale = 1;
    container.style.overflowX = 'auto';
  } else {
    const rawScale = container.offsetWidth / baseWidth;
    scale = Math.min(rawScale, 1);
    container.style.overflowX = 'hidden';
  }

  iframe.style.transform = `scale(${scale})`;
  container.style.height = `${Math.floor(baseHeight * scale)}px`;
}

document.addEventListener('DOMContentLoaded', scaleIframe);
window.addEventListener('resize', scaleIframe);
</script>
