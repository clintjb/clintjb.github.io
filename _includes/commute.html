<div class="iframe-container" id="dashboard-container">
  <iframe src="https://htmlpreview.github.io/?https://raw.githubusercontent.com/clintjb/Commute-Tracking/main/dashboard.html"></iframe>
</div>

<style>
#dashboard-container {
  position: relative;
  width: 100%;
  overflow: hidden;
}
#dashboard-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 780px;
  height: 1400px;
  transform-origin: top left;
  display: block;
  border: none;
}
</style>

<script>
function scaleDashboard() {
  const container = document.getElementById('dashboard-container');
  const iframe = container?.querySelector('iframe');
  if (!iframe || !container) return;

  const baseWidth = 780;
  const baseHeight = 1400;

  let scale;
  if (window.innerWidth < 600) {
    scale = 1;
    container.style.overflowX = 'auto';
  } else {
    const rawScale = container.offsetWidth / baseWidth;
    scale = Math.min(rawScale, 1);
    container.style.overflowX = 'hidden';
  }

  iframe.style.transform = `scale(${scale})`;
  container.style.height = `${Math.floor(baseHeight * scale)}px`;
}

document.addEventListener('DOMContentLoaded', scaleDashboard);
window.addEventListener('resize', scaleDashboard);
</script>
